name: Deploy to GitHub Pages

# Builds the client and publishes client/dist to the `gh-pages` branch,
# which GitHub Pages serves. Runs on every push to main so the live site
# stays in sync with source without a manual rebuild.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # required to push the build to the gh-pages branch

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Deploy build to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: client/dist
          # keep commit history on the deploy branch
          keep_files: false
